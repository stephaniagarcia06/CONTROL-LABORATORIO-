<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalibPro - Informes con Fotos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #1e40af; margin-bottom: 20px; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: 600; font-size: 0.85rem; }
        input, select, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 12px; font-family: inherit; }
        button { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-danger { background: #dc2626; }
        .btn-warning { background: #f59e0b; }
        .btn-success { background: #10b981; }
        .observacion-block { background: #f8fafc; padding: 15px; border-radius: 16px; margin-bottom: 15px; border-left: 4px solid #2563eb; }
        .foto-preview { max-width: 150px; max-height: 150px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #ddd; }
        .status-pendiente { background: #fff3e0; color: #e67e22; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
        .status-aprobado { background: #e6f7e6; color: #2e7d32; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #e2e8f0; color: #1e293b; }
        .tab-btn.active { background: #2563eb; color: white; }
        .tab-pane { display: none; }
        .tab-pane.active-pane { display: block; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔬 CalibPro — Informes Técnicos</h1>
    
    <div class="tabs">
        <button class="tab-btn active" data-tab="informes">📋 Informes</button>
        <button class="tab-btn" data-tab="nuevo">📝 Nuevo Informe</button>
        <button class="tab-btn" data-tab="aprobacion">✏️ Aprobación</button>
    </div>

    <!-- LISTA DE INFORMES -->
    <div id="informes" class="tab-pane active-pane">
        <div class="card">
            <h3>Informes generados</h3>
            <table>
                <thead><tr><th>ID</th><th>Fecha</th><th>Serial</th><th>Cliente</th><th>Tipo</th><th>Estado</th><th>PDF</th></tr></thead>
                <tbody id="listaInformesBody"></tbody>
            </table>
        </div>
    </div>

    <!-- NUEVO INFORME CON OBSERVACIONES DINÁMICAS -->
    <div id="nuevo" class="tab-pane">
        <div class="card">
            <h3>📝 Nuevo informe</h3>
            <div class="form-row">
                <div class="form-group"><label>📅 Fecha</label><input type="date" id="fecha"></div>
                <div class="form-group"><label>🔧 Serial</label><input id="serial" placeholder="Ej: 1095120"></div>
                <div class="form-group"><label>🏷️ Marca</label><input id="marca" placeholder="EXFO"></div>
                <div class="form-group"><label>📟 Modelo</label><input id="modelo" placeholder="MAX715"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>👤 Cliente</label><input id="cliente" placeholder="INMEL INGENIERIA"></div>
                <div class="form-group"><label>🔧 Servicio</label><select id="tipo"><option>Calibración</option><option>Ajuste mecánico</option><option>Ambos</option></select></div>
                <div class="form-group"><label>💰 Valores</label><textarea id="valores" rows="2" placeholder="Ej: Calibración: $583.333 + IVA"></textarea></div>
            </div>
            
            <div style="margin: 15px 0;"><label>📋 Diagnóstico principal</label><textarea id="diagnostico" rows="3" placeholder="Descripción técnica..."></textarea></div>
            
            <hr>
            <h4>📌 Diagnósticos / Observaciones adicionales (con fotos)</h4>
            <div id="observacionesContainer"></div>
            <button id="btnAgregarObs" class="btn-success">+ Agregar diagnóstico adicional</button>
            
            <button id="btnGuardar" style="width:100%; margin-top:20px;">💾 Guardar Informe</button>
        </div>
    </div>

    <!-- APROBACIÓN COMERCIAL -->
    <div id="aprobacion" class="tab-pane">
        <div class="card">
            <div class="form-group"><label>Seleccionar informe</label><select id="selectInforme"></select></div>
            <div class="form-group"><label>Fecha envío al cliente</label><input type="date" id="fechaEnvio"></div>
            <div class="form-group"><label>Estado</label><select id="estadoFinal"><option>Pendiente</option><option>Aprobado</option><option>Rechazado</option></select></div>
            <div class="form-group"><label>Observaciones del cliente</label><textarea id="obsCliente" rows="2"></textarea></div>
            <button id="btnActualizar">Actualizar</button>
        </div>
    </div>
</div>

<script>
    // ==================== DATOS ====================
    let informes = [];
    let nextId = 100;
    
    // Variables para el nuevo informe
    let observacionesTemp = []; // cada elemento: { fecha, texto, fotoBase64 }
    
    // ==================== FUNCIÓN PARA CONVERTIR FOTO A BASE64 ====================
    function convertirFotoA64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });
    }
    
    // ==================== RENDERIZAR OBSERVACIONES TEMPORALES ====================
    function renderizarObsTemp() {
        const container = document.getElementById("observacionesContainer");
        if(observacionesTemp.length === 0) {
            container.innerHTML = '<p style="color:#999;">No hay diagnósticos adicionales. Usa el botón para agregar.</p>';
            return;
        }
        let html = '';
        for(let i = 0; i < observacionesTemp.length; i++) {
            const obs = observacionesTemp[i];
            html += `
                <div class="observacion-block">
                    <strong>📝 Diagnóstico adicional ${i+1}</strong><br>
                    <strong>Fecha:</strong> ${obs.fecha}<br>
                    <strong>Texto:</strong> ${obs.texto}<br>
            `;
            if(obs.fotoBase64) {
                html += `<img src="${obs.fotoBase64}" class="foto-preview"><br>`;
            }
            html += `<button class="btn-danger" style="margin-top:8px;" onclick="eliminarObsTemp(${i})">Eliminar</button>`;
            html += `</div>`;
        }
        container.innerHTML = html;
    }
    
    // Eliminar observación temporal
    window.eliminarObsTemp = (idx) => {
        observacionesTemp.splice(idx, 1);
        renderizarObsTemp();
    };
    
    // Agregar nueva observación (con foto)
    document.getElementById("btnAgregarObs").onclick = () => {
        const fecha = prompt("📅 Fecha del diagnóstico adicional (YYYY-MM-DD):", new Date().toISOString().slice(0,10));
        if(!fecha) return;
        const texto = prompt("📝 Escriba el diagnóstico u observación técnica:");
        if(!texto) return;
        
        const usarFoto = confirm("¿Agregar una foto? (Aceptar = sí, Cancelar = no)");
        if(usarFoto) {
            const inputFile = document.createElement('input');
            inputFile.type = 'file';
            inputFile.accept = 'image/*';
            inputFile.onchange = async (e) => {
                const file = e.target.files[0];
                let foto = '';
                if(file) foto = await convertirFotoA64(file);
                observacionesTemp.push({ fecha, texto, fotoBase64: foto });
                renderizarObsTemp();
            };
            inputFile.click();
        } else {
            observacionesTemp.push({ fecha, texto, fotoBase64: '' });
            renderizarObsTemp();
        }
    };
    
    // ==================== GUARDAR INFORME ====================
    document.getElementById("btnGuardar").onclick = () => {
        const fecha = document.getElementById("fecha").value || new Date().toISOString().slice(0,10);
        const serial = document.getElementById("serial").value.trim();
        const marca = document.getElementById("marca").value.trim();
        const modelo = document.getElementById("modelo").value.trim();
        const cliente = document.getElementById("cliente").value.trim();
        const tipo = document.getElementById("tipo").value;
        const diagnostico = document.getElementById("diagnostico").value.trim();
        const valores = document.getElementById("valores").value.trim();
        
        if(!serial || !cliente || !diagnostico) {
            alert("❌ Completa: Serial, Cliente y Diagnóstico principal");
            return;
        }
        
        const nuevoId = nextId++;
        informes.push({
            id: nuevoId, fecha, serial, marca, modelo, cliente, tipo,
            diagnostico, valores, observaciones: [...observacionesTemp],
            estado: "Pendiente", fechaEnvio: "", obsCliente: ""
        });
        
        // Limpiar formulario
        document.getElementById("serial").value = "";
        document.getElementById("marca").value = "";
        document.getElementById("modelo").value = "";
        document.getElementById("cliente").value = "";
        document.getElementById("diagnostico").value = "";
        document.getElementById("valores").value = "";
        observacionesTemp = [];
        renderizarObsTemp();
        
        renderizarListaInformes();
        cargarSelectAprobacion();
        alert(`✅ Informe #${nuevoId} guardado con ${informes[informes.length-1].observaciones.length} diagnósticos adicionales.`);
    };
    
    // ==================== RENDERIZAR LISTA DE INFORMES ====================
    function renderizarListaInformes() {
        const tbody = document.getElementById("listaInformesBody");
        if(informes.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">Sin informes</td></tr>';
            return;
        }
        tbody.innerHTML = informes.map(i => `
            <tr>
                <td>${i.id}</td><td>${i.fecha}</td><td>${i.serial}</td><td>${i.cliente}</td>
                <td>${i.tipo}</td>
                <td class="${i.estado === 'Aprobado' ? 'status-aprobado' : 'status-pendiente'}">${i.estado}</td>
                <td><button onclick="generarPDF(${i.id})" style="background:#dc2626; padding:5px 12px;">📄 PDF</button></td>
            </tr>
        `).join('');
    }
    
    // ==================== CARGAR SELECT APROBACIÓN ====================
    function cargarSelectAprobacion() {
        const select = document.getElementById("selectInforme");
        select.innerHTML = '<option value="">Seleccionar</option>' + 
            informes.map(i => `<option value="${i.id}">#${i.id} - ${i.serial} - ${i.cliente}</option>`).join('');
    }
    
    // ==================== ACTUALIZAR APROBACIÓN ====================
    document.getElementById("btnActualizar").onclick = () => {
        const id = parseInt(document.getElementById("selectInforme").value);
        if(!id) return;
        const inf = informes.find(i => i.id === id);
        if(inf) {
            inf.fechaEnvio = document.getElementById("fechaEnvio").value;
            inf.estado = document.getElementById("estadoFinal").value;
            inf.obsCliente = document.getElementById("obsCliente").value;
            renderizarListaInformes();
            alert("✅ Estado actualizado");
        }
    };
    
    // ==================== GENERAR PDF ====================
    window.generarPDF = async (id) => {
        const inf = informes.find(i => i.id === id);
        if(!inf) return;
        
        const fechaActual = new Date().toLocaleDateString('es-CO');
        let obsAdicionalesHtml = '';
        if(inf.observaciones && inf.observaciones.length > 0) {
            obsAdicionalesHtml = '<div style="margin:20px 0;"><strong>📋 Diagnósticos / Observaciones adicionales:</strong><br>';
            for(let i = 0; i < inf.observaciones.length; i++) {
                const obs = inf.observaciones[i];
                obsAdicionalesHtml += `<div style="margin-bottom:15px; border-left:2px solid #2563eb; padding-left:12px;">
                    <strong>Fecha:</strong> ${obs.fecha}<br>
                    <strong>Texto:</strong> ${obs.texto}<br>`;
                if(obs.fotoBase64) {
                    obsAdicionalesHtml += `<img src="${obs.fotoBase64}" style="max-width:100%; max-height:200px; margin-top:8px;"><br>`;
                }
                obsAdicionalesHtml += `</div>`;
            }
            obsAdicionalesHtml += '</div>';
        }
        
        const pdfHtml = `
            <div style="font-family: 'Segoe UI', sans-serif; padding: 30px;">
                <div style="text-align:center; border-bottom:2px solid #2563eb; padding-bottom:15px;">
                    <h2>INFORME GENERAL</h2>
                    <p>CI RENTELCOM SAS - Laboratorio de Calibración</p>
                </div>
                <div style="text-align:right; margin:15px 0;">${fechaActual}</div>
                <div><strong>Señores:</strong> ${inf.cliente}</div>
                <div><strong>Reporte Técnico N° ${inf.id}</strong></div>
                <div style="margin:15px 0;">Se recibe ${inf.marca} ${inf.modelo} (Serial: ${inf.serial}) para ${inf.tipo}.</div>
                <div><strong>Diagnóstico principal:</strong><br>${inf.diagnostico.replace(/\n/g,'<br>')}</div>
                <div style="margin:15px 0;"><strong>Valores:</strong><br>${inf.valores ? inf.valores.replace(/\n/g,'<br>') : 'No especificado'}</div>
                ${obsAdicionalesHtml}
                <div style="margin-top:30px; border-top:1px solid #ccc; padding-top:15px;">
                    <strong>Verificado por:</strong><br>
                    Ing. Stephania Garcia<br>
                    Auditor ISO/IEC 17025:2017
                </div>
                <div style="margin-top:20px; font-size:10px; text-align:center;">
                    CARRERA 19A No. 150-50 BOGOTA D.C. TELÉFONO 9399167 - 318 5586239
                </div>
            </div>
        `;
        
        const tempDiv = document.createElement('div');
        tempDiv.style.position = 'absolute'; tempDiv.style.left = '-9999px';
        tempDiv.innerHTML = pdfHtml;
        document.body.appendChild(tempDiv);
        
        const opt = { margin: [0.5,0.5,0.5,0.5], filename: `INFORME_${inf.id}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
        await html2pdf().set(opt).from(tempDiv).save();
        document.body.removeChild(tempDiv);
    };
    
    // ==================== TABS ====================
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active-pane"));
            document.getElementById(btn.dataset.tab).classList.add("active-pane");
            if(btn.dataset.tab === "aprobacion") cargarSelectAprobacion();
        });
    });
    
    renderizarListaInformes();
    cargarSelectAprobacion();
</script>
</body>
</html>
